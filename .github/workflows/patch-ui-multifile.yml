name: Patch UI and enable multifile upload

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/patch-ui-multifile.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch HTML
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          src = Path('extraktor_v3_ocr_full.html') if Path('extraktor_v3_ocr_full.html').exists() else Path('index.html')
          html = src.read_text(encoding='utf-8')

          # Make file input accept multiple PDFs and clarify dropzone text.
          html = html.replace('<span>or click to choose a file. PDFs with text/OCR layer work best.</span>', '<span>or click to choose one or more PDF files. PDFs with text/OCR layer work best.</span>')
          html = html.replace('<input id="pdfFile" class="hidden" type="file" accept="application/pdf" />', '<input id="pdfFile" class="hidden" type="file" accept="application/pdf" multiple />')

          # Move main controls directly below upload area.
          controls = '''          <div class="btn-row">
            <button id="extractBtn" class="btn primary" type="button">Extract</button>
            <button id="warmBtn" class="btn" type="button">Warm WebLLM</button>
            <button id="cancelBtn" class="btn danger" type="button" disabled>Cancel</button>
            <button id="clearBtn" class="btn" type="button">Clear</button>
          </div>
'''
          new_controls = '''          <div class="btn-row quick-actions">
            <button id="extractBtn" class="btn primary" type="button">Extract</button>
            <button id="warmBtn" class="btn" type="button">Warm WebLLM</button>
            <button id="cancelBtn" class="btn danger" type="button" disabled>Cancel</button>
            <button id="clearBtn" class="btn" type="button">Clear</button>
          </div>
'''
          if controls in html:
              html = html.replace(controls, '', 1)
          anchor = '<input id="pdfFile" class="hidden" type="file" accept="application/pdf" multiple />\n'
          if 'class="btn-row quick-actions"' not in html and anchor in html:
              html = html.replace(anchor, anchor + '\n' + new_controls, 1)

          # Add CSS for higher/stickier controls and selected-file list.
          css = '''
    .quick-actions {
      position: sticky;
      top: 76px;
      z-index: 8;
      margin: 12px 0 14px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 28px rgba(0,0,0,.18);
    }

    .quick-actions .btn.primary {
      min-width: 132px;
      flex: 1 1 132px;
    }

    .file-list {
      margin: 10px 0 12px;
      max-height: 132px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      padding: 8px;
      display: grid;
      gap: 5px;
    }

    .file-list .file-item {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      border-bottom: 1px solid color-mix(in srgb, var(--border) 65%, transparent);
      padding: 4px 0;
    }

    .file-list .file-item:last-child { border-bottom: 0; }
'''
          if '.quick-actions {' not in html:
              html = html.replace('    .btn-row {\n      display: flex;\n      gap: 8px;\n      flex-wrap: wrap;\n    }', '    .btn-row {\n      display: flex;\n      gap: 8px;\n      flex-wrap: wrap;\n    }\n' + css, 1)

          # Add selected file list below the upload area.
          if 'id="selectedFiles"' not in html:
              html = html.replace(anchor, anchor + '\n          <div id="selectedFiles" class="file-list hidden"></div>\n', 1)

          # Extend state with files array.
          html = html.replace('''    file: null,
    pdfText: "",''', '''    file: null,
    files: [],
    pdfText: "",''')

          # Replace selectFile with selectFiles + compatibility wrapper.
          old_select = '''  function selectFile(file) {
    if (!file) return;
    if (file.type && file.type !== "application/pdf" && !file.name.toLowerCase().endsWith(".pdf")) {
      alert("Please choose a PDF file.");
      return;
    }
    state.file = file;
    $("fileBadge").textContent = `${file.name} (${formatBytes(file.size)})`;
    $("fileBadge").className = "pill ok";
    log(`Selected file: ${file.name} (${formatBytes(file.size)})`);
  }
'''
          new_select = '''  function selectFiles(fileList) {
    const files = [...(fileList || [])].filter(file => {
      const isPdf = (!file.type || file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf"));
      if (!isPdf) log(`Skipped non-PDF file: ${file.name}`, "warn");
      return isPdf;
    });
    if (!files.length) return;

    state.files = files;
    state.file = files[0];

    const totalBytes = files.reduce((sum, file) => sum + (file.size || 0), 0);
    $("fileBadge").textContent = files.length === 1
      ? `${files[0].name} (${formatBytes(files[0].size)})`
      : `${files.length} PDFs (${formatBytes(totalBytes)})`;
    $("fileBadge").className = "pill ok";

    const list = $("selectedFiles");
    if (list) {
      list.classList.remove("hidden");
      list.innerHTML = files.map(file => `<div class="file-item"><span>${escapeHtml(file.name)}</span><span>${formatBytes(file.size)}</span></div>`).join("");
    }

    log(files.length === 1
      ? `Selected file: ${files[0].name} (${formatBytes(files[0].size)})`
      : `Selected ${files.length} PDF files (${formatBytes(totalBytes)})`);
  }

  function selectFile(file) {
    if (!file) return;
    selectFiles([file]);
  }
'''
          if old_select in html:
              html = html.replace(old_select, new_select, 1)

          # Rename current extraction function and add a batch wrapper.
          html = html.replace('  async function runExtraction() {', '  async function runSingleExtraction() {', 1)
          batch_wrapper = '''
  async function runExtraction() {
    const files = state.files?.length ? state.files : [...($("pdfFile").files || [])];
    if (!files.length) {
      alert("Choose one or more PDF files first.");
      return;
    }

    if (files.length === 1) {
      state.file = files[0];
      return await runSingleExtraction();
    }

    const batchStart = nowMs();
    const batchResults = [];
    const batchWarnings = [];
    log(`Starting batch extraction for ${files.length} PDF files.`);

    for (let i = 0; i < files.length; i++) {
      if (state.cancelled) break;
      state.file = files[i];
      $("fileBadge").textContent = `Batch ${i + 1}/${files.length}: ${files[i].name}`;
      $("fileBadge").className = "pill accent";
      log(`Batch ${i + 1}/${files.length}: ${files[i].name}`);
      await runSingleExtraction();
      batchResults.push({
        file_name: files[i].name,
        medications: structuredClone(state.result.medications || []),
        warnings: structuredClone(state.result.warnings || []),
        engine: state.engineUsed,
        pages_scanned: state.pagesScanned,
        ocr_used: state.ocrUsed
      });
    }

    const mergedInputs = batchResults.map(item => ({
      medications: (item.medications || []).map(med => ({
        ...med,
        evidence_text: `[${item.file_name}] ${med.evidence_text || ""}`.trim()
      })),
      warnings: (item.warnings || []).map(w => `[${item.file_name}] ${w}`)
    }));

    const merged = mergeMedicationResults(mergedInputs);
    state.result = { ...merged, batch_results: batchResults };
    state.engineUsed = `Batch (${batchResults.length}/${files.length})`;
    timeEnd("Batch total", batchStart, `${batchResults.length} file(s), ${merged.medications.length} unique medication(s)`);
    renderAll();
    setRunBadge("Batch done", "ok");
    setProgress(100, "done", "Batch done");
    log(`Batch done. ${batchResults.length}/${files.length} files processed.`, "ok");
  }
'''
          if 'async function runExtraction() {' not in html:
              html = html.replace('  async function runSingleExtraction() {', batch_wrapper + '\n  async function runSingleExtraction() {', 1)

          # Update base filename for batch exports.
          html = html.replace('''  function baseFilename() {
    const raw = state.file?.name?.replace(/\.pdf$/i, "") || "extraktor_result";
    return raw.replace(/[^\w.-]+/g, "_");
  }
''', '''  function baseFilename() {
    const raw = state.files?.length > 1
      ? `batch_${state.files.length}_pdfs`
      : (state.file?.name?.replace(/\.pdf$/i, "") || "extraktor_result");
    return raw.replace(/[^\w.-]+/g, "_");
  }
''')

          # Update event handlers to pass all selected/dropped files.
          html = html.replace('$("pdfFile").addEventListener("change", e => selectFile(e.target.files?.[0]));', '$("pdfFile").addEventListener("change", e => selectFiles(e.target.files));')
          html = html.replace('$("dropzone").addEventListener("drop", e => selectFile(e.dataTransfer.files?.[0]));', '$("dropzone").addEventListener("drop", e => selectFiles(e.dataTransfer.files));')

          # Clear selected file list on clear.
          html = html.replace('''      state.pdfText = "";
      state.chunks = [];''', '''      state.pdfText = "";
      state.files = [];
      state.file = null;
      const selectedFiles = $("selectedFiles");
      if (selectedFiles) { selectedFiles.innerHTML = ""; selectedFiles.classList.add("hidden"); }
      $("fileBadge").textContent = "No file";
      $("fileBadge").className = "pill";
      state.chunks = [];''', 1)

          # Write full app as index and remove old duplicate path.
          Path('index.html').write_text(html, encoding='utf-8')
          old = Path('extraktor_v3_ocr_full.html')
          if old.exists():
            old.unlink()
          PY

      - name: Commit patched app
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/patch-ui-multifile.yml
          git rm -f extraktor_v3_ocr_full.html 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Move controls up and enable multifile PDF upload"
            git push
          fi
